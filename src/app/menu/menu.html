<div class="container py-5">
  <h1 class="text-center mb-4 fw-bold text-success">Notre Menu Traditionnel</h1>

  <div class="d-flex justify-content-center mb-5">
    <ul class="nav nav-pills bg-light p-2 rounded-pill shadow-sm">
      <li class="nav-item" *ngFor="let tab of filterTabs">
        <button 
          class="nav-link rounded-pill px-4 fw-semibold border-0 transition-all"
          [class.active]="currentFilter === tab.id"
          [class.bg-success]="currentFilter === tab.id"
          (click)="setFilter(tab.id)">
          {{ tab.label }}
        </button>
      </li>
    </ul>
  </div>

  <div class="menu-scroll-container overflow-x-auto pb-3">
    
    <div class="d-flex flex-column flex-wrap menu-grid-height">
      
      <div *ngFor="let item of filteredItems" class="menu-card-wrapper p-2">
        <div class="card h-100 shadow-sm border-0 transition-hover">
          <img [src]="item.image" class="card-img-top object-fit-cover" [alt]="item.name" style="height: 160px;">
          <div class="card-body d-flex flex-column justify-content-between">
            <div>
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h5 class="card-title fw-bold text-truncate mb-0" style="max-width: 65%;">{{ item.name }}</h5>
                <span class="badge bg-success-subtle text-success rounded-pill px-2 py-1 small">{{ item.price }} FCFA</span>
              </div>
              <p class="card-text text-muted small text-line-clamp">{{ item.description }}</p>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-2">
              <span class="badge text-uppercase bg-secondary-subtle text-secondary px-2 py-1 style-category">{{ item.category }}</span>
              <button class="btn btn-outline-success btn-sm px-3">Commander</button>
            </div>
          </div>
        </div>
      </div>

      <div *ngIf="filteredItems.length === 0" class="w-100 text-center py-5 text-muted fw-medium">
        Aucun plat trouvé dans cette catégorie.
      </div>

    </div>w
  </div>
</div>
