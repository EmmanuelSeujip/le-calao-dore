<section id="horaires" class="py-5 bg-light">
  <div class="container" style="max-width: 700px;">
    <h2 class="text-center mb-4 fw-bold text-dark">Nos horaires d'ouverture</h2>

    <div class="card shadow-sm border-0 overflow-hidden">
      <ul class="list-group list-group-flush">
        @for (h of horaires; track h.jour) {
        <li class="list-group-item d-flex justify-content-between align-items-center py-3 px-4 transition-row"
          [class.current-day]="h.jour === jourActuel">

          <span class="fw-semibold text-dark fs-5">{{ h.jour }}</span>

          @if (h.ferme) {
          <span class="badge rounded-pill bg-danger px-3 py-2">Fermé</span>
          } @else {
          <div class="d-flex align-items-center">
            <span class="text-secondary fw-medium fs-6">{{ h.ouverture }} - {{ h.fermeture }}</span>

            @if (h.jour === jourActuel) {
            <span class="badge bg-success ms-3 animate-pulse">
              Ouvert aujourd'hui
            </span>
            }
          </div>
          }
        </li>
        }
      </ul>
    </div>
  </div>
</section>
